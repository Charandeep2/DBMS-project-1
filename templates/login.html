<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Accident Analysis System | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; height: 100vh; align-items: center; justify-content: center; }
        .login-box { background: rgba(30, 41, 59, 0.8); padding: 50px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 400px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 10px; color: #3b82f6; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 40px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #cbd5e1; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: white; font-family: inherit; margin-bottom: 25px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .btn-login { background: #3b82f6; color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #2563eb; transform: translateY(-2px); }
        .flash { background: #ef4444; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 600; font-size: 14px; }
        .flash.success { background: #10b981; }
        .flash.warning { background: #f59e0b; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🚨 Road Accident Analysis System</div>
        <div class="subtitle">Central Intelligence Portal</div>
        
        {% with m = get_flashed_messages(with_categories=true) %}
            {% if m %}{% for c, msg in m %}<div class="flash {{c}}">{{msg}}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Enter your username">
            
            <label>Security Key (Password)</label>
            <input type="password" name="password" required placeholder="••••••••">
            
            <button type="submit" class="btn-login">Authenticate</button>
        </form>
    </div>
</body>
</html>
